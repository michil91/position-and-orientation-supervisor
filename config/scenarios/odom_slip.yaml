# Odometry slip scenario — wheel slip causes understated odometry velocity.
#
# Vehicle moves at 10 m/s (36 km/h).  Slip activates at t=10s, multiplying the
# reported odometry velocity by 0.95 (5% understatement).  With 10 m/s true speed
# the cumulative displacement error grows at ~0.5 m/s after slip onset:
#   ODOM_GNSS_DIVERGENCE_WARN     at ~t=13s  (delta > 1.5 m)
#   ODOM_GNSS_DIVERGENCE_CRITICAL at ~t=16s  (delta > 3.0 m)
# The 5% understatement stays above the 10% slip_ratio threshold, so
# ODOM_SLIP_SUSPECTED does not trigger — this scenario demonstrates the
# divergence detection path rather than the systematic-slip path.

gnss_publisher:
  ros__parameters:
    linear_velocity_mps: 10.0

imu_publisher:
  ros__parameters:
    linear_velocity_mps: 10.0

vehicle_state_publisher:
  ros__parameters:
    linear_velocity_mps: 10.0

odometry_publisher:
  ros__parameters:
    linear_velocity_mps: 10.0
    fault_mode: slip
    slip_factor: 0.95
    slip_time_s: 10.0
